<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operation Yey of Sauron</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
    }
    main {
      width: 100vw;
      height: 100vh;
    }
    h1 {
      color: red;
      position: absolute;
      z-index: 2;
      left: 12px;
      top: 40px;
      margin: 0;
      font-size: 18px;
      text-shadow: 0 1px 3px #000;
    }
    p { margin: 0 0 16px; color: #bbb; }
    .stream {
      position: relative;
      width: 100%;
      height: 100%;
    }
    img {
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
      object-fit: cover;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: grid;
      gap: 8px;
      padding: 10px;
      width: 220px;
      box-sizing: border-box;
      border: 1px solid #444;
      border-radius: 8px;
      background: rgb(0 0 0 / 70%);
    }
    .control {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #ddd;
    }
    label {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
    }
    input[type="range"] {
      width: 200px;
      max-width: 100%;
      accent-color: #5fd18d;
    }
    output {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    button {
      height: 34px;
      border: 1px solid #666;
      border-radius: 6px;
      background: #1b1b1b;
      color: #eee;
      cursor: pointer;
    }
    #record {
      width: 100px;
    }
    button.recording {
      border-color: #f06d6d;
      background: #521b1b;
    }
    .record-status {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 12px;
      color: #bbb;
    }
    .hint { margin-top: 12px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <main>
    <h1>Operation "Eye of Sauron"</h1>
    <div class="stream">
      <img src="/stream.mjpg" alt="Camera stream">
      <div class="controls">
        <div class="control">
          <label for="horizontal"><span>Horizontal</span><output id="horizontalValue">0</output></label>
          <input id="horizontal" type="range" min="-100" max="100" value="0" step="1">
        </div>
        <div class="control">
          <label for="vertical"><span>Vertical</span><output id="verticalValue">0</output></label>
          <input id="vertical" type="range" min="-100" max="100" value="0" step="1">
        </div>
        <button id="record" type="button">Record</button>
        <div id="recordStatus" class="record-status">Not recording</div>
      </div>
    </div>
  </main>
  <script>
    const horizontal = document.querySelector("#horizontal");
    const vertical = document.querySelector("#vertical");
    const horizontalValue = document.querySelector("#horizontalValue");
    const verticalValue = document.querySelector("#verticalValue");
    const record = document.querySelector("#record");
    const recordStatus = document.querySelector("#recordStatus");
    let sendTimer;
    let isRecording = false;

    function clamp(value) {
      return Math.max(-100, Math.min(100, value));
    }

    function renderValues() {
      horizontalValue.value = horizontal.value;
      verticalValue.value = vertical.value;
    }

    function postDirection() {
      return fetch("/api/direction", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          horizontal: Number(horizontal.value),
          vertical: Number(vertical.value),
        }),
      }).catch(() => {});
    }

    function sendDirection() {
      clearTimeout(sendTimer);
      sendTimer = setTimeout(postDirection, 80);
    }

    function setDirection(nextHorizontal, nextVertical) {
      horizontal.value = clamp(nextHorizontal);
      vertical.value = clamp(nextVertical);
      renderValues();
      sendDirection();
    }

    function moveBy(deltaHorizontal, deltaVertical) {
      setDirection(Number(horizontal.value) + deltaHorizontal, Number(vertical.value) + deltaVertical);
    }

    function centerDirection() {
      horizontal.value = 0;
      vertical.value = 0;
      renderValues();
      postDirection();
    }

    function renderRecording(file, error) {
      record.textContent = isRecording ? "Stop" : "Record";
      record.classList.toggle("recording", isRecording);
      recordStatus.textContent = error || (isRecording ? file || "Recording" : "Not recording");
      recordStatus.title = recordStatus.textContent;
    }

    function applyRecording(data) {
      isRecording = Boolean(data.recording);
      renderRecording(data.file, data.error || "");
    }

    function toggleRecording() {
      const path = isRecording ? "/api/recording/stop" : "/api/recording/start";
      record.disabled = true;
      fetch(path, { method: "POST" })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(applyRecording)
        .catch((error) => renderRecording("", `Recording request failed: ${error.message}`))
        .finally(() => { record.disabled = false; });
    }

    [horizontal, vertical].forEach((slider) => {
      slider.addEventListener("input", () => {
        renderValues();
        sendDirection();
      });
    });

    record.addEventListener("click", toggleRecording);

    document.addEventListener("keydown", (event) => {
      const moves = {
        ArrowLeft: [-1, 0],
        ArrowRight: [1, 0],
        ArrowUp: [0, 1],
        ArrowDown: [0, -1],
      };
      const move = moves[event.key];
      if (!move) return;
      event.preventDefault();
      moveBy(move[0], move[1]);
    });

    centerDirection();
    fetch("/api/status")
      .then((response) => response.json())
      .then((data) => applyRecording(data.recording || {}))
      .catch(() => {});
  </script>
</body>
</html>
