<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operation Yey of Sauron</title>
  <style>
    :root { color-scheme: dark; }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
    }
    main {
      width: 100vw;
      height: 100vh;
    }
    h1 {
      animation: blink 2s steps(1, end) infinite;
      color: red;
      position: absolute;
      z-index: 2;
      left: 24px;
      top: 60px;
      margin: 0;
      font-size: 18px;
      text-shadow: 0 1px 3px #000;
    }
    @keyframes blink {
      0%, 49.9% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    p { margin: 0 0 16px; color: #bbb; }
    .stream {
      position: relative;
      width: 100%;
      height: 100%;
    }
    img {
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
      object-fit: cover;
    }
    .crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }
    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: #ff2020;
      box-shadow: 0 0 3px #000;
    }
    .crosshair::before {
      left: 0;
      top: 13px;
      width: 28px;
      height: 2px;
    }
    .crosshair::after {
      left: 13px;
      top: 0;
      width: 2px;
      height: 28px;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: grid;
      gap: 8px;
      padding: 10px;
      width: 220px;
      box-sizing: border-box;
      border: 1px solid #444;
      border-radius: 8px;
      background: rgb(0 0 0 / 70%);
    }
    .controls > * {
      min-width: 0;
    }
    .control {
      display: grid;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #ddd;
    }
    .control label {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 8px;
      align-items: center;
    }
    .limits {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }
    .limits label {
      display: grid;
      gap: 3px;
      min-width: 0;
      font-size: 10px;
      color: #bbb;
    }
    .limit-input {
      width: 100%;
      height: 26px;
      min-width: 0;
      padding: 0 3px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #111;
      color: #eee;
      font-size: 12px;
      text-align: center;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
    }
    input[type="number"] {
      appearance: textfield;
    }
    input[type="range"] {
      width: 100%;
      min-width: 0;
      accent-color: #5fd18d;
    }
    output {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    button {
      height: 34px;
      border: 1px solid #666;
      border-radius: 6px;
      background: #1b1b1b;
      color: #eee;
      cursor: pointer;
    }
    #record {
      width: 100px;
    }
    button:disabled,
    input:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    button.recording {
      border-color: #f06d6d;
      background: #521b1b;
    }
    .record-status {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 12px;
      color: #bbb;
    }
    .check {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-size: 13px;
      color: #eee;
    }
    .check input {
      width: 16px;
      height: 16px;
      accent-color: #5fd18d;
    }
    .follow-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px;
      gap: 8px;
      align-items: stretch;
      min-width: 0;
      width: 100%;
    }
    #follow {
      width: 100%;
      min-width: 0;
    }
    .steps-input {
      width: 100%;
      height: 34px;
      min-width: 0;
      padding: 0 4px;
      box-sizing: border-box;
      border: 1px solid #666;
      border-radius: 6px;
      background: #111;
      color: #eee;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }
    .motor-status {
      min-height: 14px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 12px;
      color: #bbb;
    }
    .hint { margin-top: 12px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <main>
    <h1>Operation "Eye of Sauron"</h1>
    <div class="stream">
      <img id="streamImage" alt="Camera stream">
      <div class="crosshair" aria-hidden="true"></div>
      <div class="controls">
        <div class="control">
          <label for="horizontal"><span>Horizontal</span><output id="horizontalValue">0</output></label>
          <input id="horizontal" type="range" min="-100" max="100" value="0" step="1">
        </div>
        <div class="control">
          <label for="vertical"><span>Vertical</span><output id="verticalValue">0</output></label>
          <input id="vertical" type="range" min="-100" max="100" value="0" step="1">
        </div>
        <div class="limits">
          <label for="minH"><span>minH</span><input id="minH" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <label for="maxH"><span>maxH</span><input id="maxH" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <label for="minV"><span>minV</span><input id="minV" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <label for="maxV"><span>maxV</span><input id="maxV" class="limit-input" type="number" min="-100" max="100" step="1"></label>
        </div>
        <div class="control">
          <label for="motionSize"><span>Motion size, cm</span><output id="motionSizeValue">5</output></label>
          <input id="motionSize" type="range" min="1" max="50" value="5" step="1">
        </div>
        <div class="follow-row">
          <button id="follow" type="button">Follow</button>
          <input id="followSteps" class="steps-input" type="number" min="1" max="5" value="3" step="1" aria-label="Follow steps">
        </div>
        <div id="followStatus" class="motor-status">Follow idle</div>
        <button id="record" type="button">Record</button>
        <div id="recordStatus" class="record-status">Not recording</div>
        <label class="check" for="motorOn">
          <input id="motorOn" type="checkbox">
          <span>Motor on</span>
        </label>
        <div id="motorStatus" class="motor-status"></div>
      </div>
    </div>
  </main>
  <script>
    const horizontal = document.querySelector("#horizontal");
    const vertical = document.querySelector("#vertical");
    const minH = document.querySelector("#minH");
    const maxH = document.querySelector("#maxH");
    const minV = document.querySelector("#minV");
    const maxV = document.querySelector("#maxV");
    const motionSize = document.querySelector("#motionSize");
    const horizontalValue = document.querySelector("#horizontalValue");
    const verticalValue = document.querySelector("#verticalValue");
    const motionSizeValue = document.querySelector("#motionSizeValue");
    const streamImage = document.querySelector("#streamImage");
    const follow = document.querySelector("#follow");
    const followSteps = document.querySelector("#followSteps");
    const followStatus = document.querySelector("#followStatus");
    const record = document.querySelector("#record");
    const recordStatus = document.querySelector("#recordStatus");
    const motorOn = document.querySelector("#motorOn");
    const motorStatus = document.querySelector("#motorStatus");
    let sendTimer;
    let motionTimer;
    let isRecording = false;
    let streamLagMs = 1000;
    let lastMoveStartedAt = 0;
    const streamUrl = "/stream.mjpg";
    const followIdleExtraMs = 500;
    const pageStartedAt = performance.now();
    const limitInputs = [minH, maxH, minV, maxV];

    function clamp(value, min = -100, max = 100) {
      return Math.max(min, Math.min(max, Number(value) || 0));
    }

    function limitValue(input, fallback) {
      return input.value.trim() === "" ? fallback : clamp(input.value);
    }

    function cleanLimit(input) {
      if (input.value.trim() === "") return;
      input.value = clamp(input.value);
    }

    function normalizeLimits(changedId = "") {
      cleanLimit(minH);
      cleanLimit(maxH);
      cleanLimit(minV);
      cleanLimit(maxV);
      if (minH.value !== "" && maxH.value !== "" && Number(minH.value) > Number(maxH.value)) {
        if (changedId === "minH") maxH.value = minH.value;
        else minH.value = maxH.value;
      }
      if (minV.value !== "" && maxV.value !== "" && Number(minV.value) > Number(maxV.value)) {
        if (changedId === "minV") maxV.value = minV.value;
        else minV.value = maxV.value;
      }
      horizontal.min = limitValue(minH, -100);
      horizontal.max = limitValue(maxH, 100);
      vertical.min = limitValue(minV, -100);
      vertical.max = limitValue(maxV, 100);
    }

    function clampHorizontal(value) {
      return clamp(value, limitValue(minH, -100), limitValue(maxH, 100));
    }

    function clampVertical(value) {
      return clamp(value, limitValue(minV, -100), limitValue(maxV, 100));
    }

    function followPayload() {
      const payload = { lag_ms: streamLagMs, max_adjustments: Number(followSteps.value) };
      if (minH.value.trim() !== "") payload.min_h = Number(minH.value);
      if (maxH.value.trim() !== "") payload.max_h = Number(maxH.value);
      if (minV.value.trim() !== "") payload.min_v = Number(minV.value);
      if (maxV.value.trim() !== "") payload.max_v = Number(maxV.value);
      return payload;
    }

    function applyLimits(send = false, changedId = "") {
      normalizeLimits(changedId);
      const nextHorizontal = clampHorizontal(horizontal.value);
      const nextVertical = clampVertical(vertical.value);
      const changed = nextHorizontal !== Number(horizontal.value) || nextVertical !== Number(vertical.value);
      horizontal.value = nextHorizontal;
      vertical.value = nextVertical;
      renderValues();
      if (changed && send) postDirection();
    }

    function renderValues() {
      horizontalValue.value = horizontal.value;
      verticalValue.value = vertical.value;
      motionSizeValue.value = motionSize.value;
    }

    function postDirection() {
      lastMoveStartedAt = performance.now();
      return fetch("/api/direction", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          horizontal: Number(horizontal.value),
          vertical: Number(vertical.value),
        }),
      }).catch(() => {});
    }

    function sendDirection() {
      clearTimeout(sendTimer);
      sendTimer = setTimeout(postDirection, 80);
    }

    function postMotionSize() {
      return fetch("/api/motion-size", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ min_size_cm: Number(motionSize.value) }),
      }).catch(() => {});
    }

    function sendMotionSize() {
      clearTimeout(motionTimer);
      motionTimer = setTimeout(postMotionSize, 120);
    }

    function setDirection(nextHorizontal, nextVertical) {
      normalizeLimits();
      horizontal.value = clampHorizontal(nextHorizontal);
      vertical.value = clampVertical(nextVertical);
      renderValues();
      sendDirection();
    }

    function moveBy(deltaHorizontal, deltaVertical) {
      setDirection(Number(horizontal.value) + deltaHorizontal, Number(vertical.value) + deltaVertical);
    }

    function centerDirection() {
      normalizeLimits();
      horizontal.value = clampHorizontal(0);
      vertical.value = clampVertical(0);
      renderValues();
      postDirection();
    }

    function renderFollow(data) {
      const steps = data.adjustments ? data.adjustments.length : 0;
      const maxSteps = clampSteps(followSteps.value);
      followStatus.textContent = `${data.status || "done"} · ${steps}/${maxSteps} · ${Math.round((data.lag_seconds || 1) * 1000)}ms`;
      followStatus.title = followStatus.textContent;
      if (data.direction) {
        horizontal.value = clampHorizontal(data.direction.horizontal);
        vertical.value = clampVertical(data.direction.vertical);
        renderValues();
      }
    }

    function runFollow() {
      followSteps.value = clampSteps(followSteps.value);
      follow.disabled = true;
      followSteps.disabled = true;
      followStatus.textContent = "Following...";
      fetch("/api/follow", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(followPayload()),
      })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(renderFollow)
        .catch((error) => {
          followStatus.textContent = `Follow failed: ${error.message}`;
          followStatus.title = followStatus.textContent;
        })
        .finally(() => {
          follow.disabled = false;
          followSteps.disabled = false;
        });
    }

    function clampSteps(value) {
      return Math.max(1, Math.min(5, Number(value) || 3));
    }

    function renderRecording(file, error) {
      record.textContent = isRecording ? "Stop" : "Record";
      record.classList.toggle("recording", isRecording);
      recordStatus.textContent = error || (isRecording ? file || "Recording" : "Not recording");
      recordStatus.title = recordStatus.textContent;
    }

    function applyRecording(data) {
      isRecording = Boolean(data.recording);
      renderRecording(data.file, data.error || "");
    }

    function toggleRecording() {
      const path = isRecording ? "/api/recording/stop" : "/api/recording/start";
      record.disabled = true;
      fetch(path, { method: "POST" })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(applyRecording)
        .catch((error) => renderRecording("", `Recording request failed: ${error.message}`))
        .finally(() => { record.disabled = false; });
    }

    function applyMotor(data) {
      motorOn.checked = Boolean(data.enabled);
      motorStatus.textContent = data.error || "";
      motorStatus.title = motorStatus.textContent;
    }

    function toggleMotor() {
      const enabled = motorOn.checked;
      motorOn.disabled = true;
      fetch("/api/motor", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ enabled }),
      })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(applyMotor)
        .catch((error) => {
          motorOn.checked = !enabled;
          motorStatus.textContent = `Motor request failed: ${error.message}`;
          motorStatus.title = motorStatus.textContent;
        })
        .finally(() => { motorOn.disabled = false; });
    }

    [horizontal, vertical].forEach((slider) => {
      slider.addEventListener("input", () => {
        applyLimits();
        renderValues();
        sendDirection();
      });
    });

    limitInputs.forEach((input) => {
      input.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        input.value = input.id.endsWith("H") ? horizontal.value : vertical.value;
        applyLimits(true, input.id);
        input.select();
      });
      input.addEventListener("change", () => applyLimits(true, input.id));
    });

    motionSize.addEventListener("input", () => {
      renderValues();
      sendMotionSize();
    });

    record.addEventListener("click", toggleRecording);
    follow.addEventListener("click", runFollow);
    followSteps.addEventListener("change", () => { followSteps.value = clampSteps(followSteps.value); });
    motorOn.addEventListener("change", toggleMotor);

    streamImage.addEventListener("load", () => {
      const startedAt = lastMoveStartedAt || pageStartedAt;
      const measuredLagMs = Math.round(performance.now() - startedAt);
      streamLagMs = Math.max(1200, Math.min(4000, measuredLagMs + followIdleExtraMs));
      followStatus.textContent = `Follow idle · ${streamLagMs}ms`;
      followStatus.title = followStatus.textContent;
    }, { once: true });

    document.addEventListener("keydown", (event) => {
      if (event.target instanceof HTMLInputElement) return;
      const moves = {
        ArrowLeft: [-1, 0],
        ArrowRight: [1, 0],
        ArrowUp: [0, 1],
        ArrowDown: [0, -1],
      };
      const move = moves[event.key];
      if (!move) return;
      event.preventDefault();
      moveBy(move[0], move[1]);
    });

    centerDirection();
    streamImage.src = streamUrl;
    fetch("/api/status")
      .then((response) => response.json())
      .then((data) => {
        const detection = data.settings && data.settings.detection;
        if (detection && detection.min_size_cm) {
          motionSize.value = detection.min_size_cm;
          renderValues();
        }
        applyRecording(data.recording || {});
        applyMotor(data.motor || {});
      })
      .catch(() => {});
  </script>
</body>
</html>
