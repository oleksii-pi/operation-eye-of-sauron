<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operation Eye of Sauron</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/controls.css">
  <script src="/static/state.js" defer></script>
  <script src="/static/api.js" defer></script>
  <script src="/static/limits.js" defer></script>
  <script src="/static/actions.js" defer></script>
  <script src="/static/events.js" defer></script>
  <script src="/static/init.js" defer></script>
</head>
<body>
  <main>
    <h1>Operation "Eye of Sauron"</h1>
    <div class="stream">
      <img id="streamImage" alt="Camera stream">
      <div class="crosshair" aria-hidden="true"></div>
      <div class="controls">
        <div class="latency-row">
          <output id="latencyValue" class="latency">Latency: unknown</output>
          <button id="latencyStart" type="button">Calibrate</button>
        </div>
        <div class="motion-row">
          <label class="check" for="motionOn">
            <input id="motionOn" type="checkbox">
            <span>Motion detection</span>
          </label>
          <div class="control motion-size">
            <label for="motionSize"><span>Size, cm</span><output id="motionSizeValue">5</output></label>
            <div class="motion-size-slider">
              <button id="motionSizeDown" class="size-step" type="button" aria-label="Decrease motion size">-</button>
              <input id="motionSize" type="range" min="1" max="50" value="5" step="1">
              <button id="motionSizeUp" class="size-step" type="button" aria-label="Increase motion size">+</button>
            </div>
          </div>
        </div>
        <label id="motionSoundRow" class="check" for="motionSound" hidden>
          <input id="motionSound" type="checkbox">
          <span>Motion sound</span>
        </label>
        <div class="record-row">
          <button id="record" type="button">Record</button>
          <label class="record-fps" for="recordFps">
            <span>FPS</span>
            <input id="recordFps" class="limit-input" type="number" min="1" max="60" step="1" value="4">
          </label>
        </div>
        <div id="recordStatus" class="record-status">Not recording</div>
        <label class="control" for="powerAddress">
          <span>LED Controller UDP</span>
          <input id="powerAddress" class="limit-input" type="text" placeholder="192.168.0.231:4210" autocomplete="off">
        </label>
        <div class="pulse-row">
          <button id="powerOn" type="button">Pulse</button>
          <input id="powerSeconds" class="limit-input" type="number" min="1" max="1000" step="1" value="1" aria-label="Light pulse seconds">
          <span>sec</span>
        </div>
        <div id="powerStatus" class="power-status"></div>
      </div>
      <div class="direction-controls">
        <div class="vertical-control">
          <label for="maxV"><span>max</span><input id="maxV" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <input id="vertical" type="range" min="-100" max="100" value="0" step="1" orient="vertical">
          <label for="minV"><span>min</span><input id="minV" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <output id="verticalValue" class="axis-value">0</output>
        </div>
        <div class="horizontal-control">
          <label for="minH"><span>min</span><input id="minH" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <input id="horizontal" type="range" min="-100" max="100" value="0" step="1">
          <label for="maxH"><span>max</span><input id="maxH" class="limit-input" type="number" min="-100" max="100" step="1"></label>
          <output id="horizontalValue" class="axis-value">0</output>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
